version: "3.9"

# GPU overlay — use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
services:
  node-c:
    build:
      context: .
      dockerfile: src/node_c/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - AIP_HTTP_PORT=8082
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-pulsar-studio-prod}
      - BUCKET_NAME=${BUCKET_NAME:-pulsar-studio-assets}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s # SDXL model takes ~60-90s to load
